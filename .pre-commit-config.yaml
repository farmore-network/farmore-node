# Pre-commit hooks. Install with: pipx install pre-commit && pre-commit install
# The gitleaks hook ensures a secret can never be committed in the first place.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--all-targets", "--", "-D", "warnings"]
