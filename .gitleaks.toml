# gitleaks policy for farmore-node. Extends the default ruleset and allowlists the
# well-known PUBLIC Anvil/Foundry test private keys used in the integration test and
# Makefile defaults. These keys are deterministic, documented by Foundry, and must NEVER
# be funded or used on a real network. No real secret is permitted anywhere in this repo.
title = "Farmore gitleaks policy (node)"

[extend]
useDefault = true

[[allowlists]]
description = "Public Anvil/Foundry test keys (account 0-4 of the standard test mnemonic)"
regexes = [
  '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''',
  '''0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d''',
  '''0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a''',
  '''0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6''',
]
paths = [
  '''e2e/tests/loop\.rs''',
  '''Makefile''',
]

[[allowlists]]
description = "Build artifacts and vendored dependencies (gitignored, never committed)"
paths = [
  "(^|/)target/",
  "(^|/)out/",
  "(^|/)cache/",
  "(^|/)broadcast/",
  "(^|/)dependencies/",
  "(^|/)node_modules/",
  "(^|/)dist/",
]
